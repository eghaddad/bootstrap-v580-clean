# Railway build configuration for NestJS monorepo
# Prevents exit code 127 errors (nest command not found)

[phases.install]
# CRITICAL: Include devDependencies for @nestjs/cli
cmds = ["npm install --include=dev"]

[phases.build]
# Build all workspaces
cmds = ["npm run build"]

[start]
# Start API server
cmd = "cd apps/api && npm run start:prod"
